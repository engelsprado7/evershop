name: Build and deploy Node.js app to Azure Web App - evershop

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Evershop
        run: npm run build

      # 🔥 Create a CLEAN deployment directory
      - name: Prepare clean deployment folder
        run: |
          mkdir deploy
          cp -r public deploy/ || true
          cp -r build deploy/ || true
          cp -r node_modules deploy/
          cp package.json deploy/
          cp package-lock.json deploy/ || true
          cp .env deploy/ || true

      # 🔥 Create ZIP from clean folder only
      - name: Create deployment zip
        run: |
          cd deploy
          zip -r ../release.zip .
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.zip
          overwrite: true
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B15AE0662CDF43F3A4F087904E7F8A22 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8B0BC396184345F2A8DC7AE6AB81CFD7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F1D738CD46184FE6A5101A2E7C4EA05F }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'evershop'
          slot-name: 'Production'
          package: release.zip
